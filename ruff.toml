target-version = "py311"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "TC",  # flake8-type-checking
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # FastAPI uses Query/Depends in function signatures by design
]

[lint.isort]
known-first-party = ["crud", "database", "models", "schemas"]

[lint.per-file-ignores]
"tests/conftest.py" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true